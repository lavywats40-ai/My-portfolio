<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Waad Elzubair Mohamed — Digital Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
<style>
  :root{
    --paper:#FFF8F0;
    --paper-line:#F0E4D8;
    --ink:#2B2320;
    --pink:#FFC2D6;
    --pink-deep:#FF8FA8;
    --sky:#BFE3F5;
    --sky-deep:#6FB8DD;
    --yellow:#FFE08A;
    --yellow-deep:#F0B429;
    --coral:#FF6F5E;
    --coral-deep:#E1503F;
    --mint:#BCE8CE;
    --mint-deep:#65B98B;
    --muted:#8A7F70;
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--paper);
    color:var(--ink);
    font-family:'Nunito', sans-serif;
    min-height:100vh;
  }

  body{
    display:flex;
    justify-content:center;
    padding:50px 16px 70px;
    overflow-x:hidden;
  }

  .wrap{ width:100%; max-width:560px; position:relative; }

  /* floating background blobs */
  .blob{
    position:absolute;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.55;
    z-index:0;
    animation:float 7s ease-in-out infinite;
  }
  .blob.b1{ width:90px; height:90px; background:var(--yellow); top:-40px; left:-30px; animation-delay:0s; }
  .blob.b2{ width:60px; height:60px; background:var(--sky); top:-20px; right:-20px; animation-delay:1.2s; }
  .blob.b3{ width:50px; height:50px; background:var(--pink); bottom:20px; left:-25px; animation-delay:2.1s; }

  @keyframes float{
    0%, 100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-14px) rotate(8deg); }
  }
  @media (prefers-reduced-motion: reduce){
    .blob{ animation:none; }
  }

  .card{
    background:var(--paper);
    border:2px solid var(--ink);
    border-radius:22px;
    position:relative;
    z-index:1;
    padding:38px 30px 30px;
    box-shadow:6px 6px 0 var(--ink);
  }

  /* washi tape corners */
  .tape{
    position:absolute;
    width:70px;
    height:24px;
    background:repeating-linear-gradient(45deg, var(--sky), var(--sky) 6px, var(--sky-deep) 6px, var(--sky-deep) 12px);
    opacity:0.85;
    border:1px solid rgba(0,0,0,0.08);
  }
  .tape.left{ top:-12px; left:24px; transform:rotate(-8deg); }
  .tape.right{ top:-12px; right:24px; background:repeating-linear-gradient(45deg, var(--pink), var(--pink) 6px, var(--pink-deep) 6px, var(--pink-deep) 12px); transform:rotate(7deg); }

  .head-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
    margin-bottom:22px;
  }

  h1{
    font-family:'Fredoka', sans-serif;
    font-weight:700;
    font-size:30px;
    line-height:1.1;
    margin:0 0 8px;
    color:var(--ink);
  }

  .title{
    font-family:'Nunito', sans-serif;
    font-weight:700;
    font-size:14px;
    color:var(--ink);
    margin:0;
    display:inline-block;
    background:var(--mint);
    padding:5px 10px;
    border-radius:8px;
    border:1.5px solid var(--ink);
    transform:rotate(-1deg);
  }

  #qrbox{
    flex-shrink:0;
    background:#fff;
    border:2px solid var(--ink);
    border-radius:12px;
    padding:6px;
    line-height:0;
    transform:rotate(3deg);
  }

  /* contact pills */
  .ledger{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
    margin-bottom:20px;
  }
  .pill{
    display:flex;
    align-items:center;
    gap:6px;
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:999px;
    padding:7px 12px;
    font-size:12.5px;
    font-weight:700;
  }
  .pill a{ color:var(--ink); text-decoration:none; }
  .pill a:hover, .pill a:focus-visible{ color:var(--coral-deep); }

  .cta{
    display:block;
    text-align:center;
    background:var(--coral);
    color:#fff;
    text-decoration:none;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:14px;
    padding:13px 20px;
    border-radius:12px;
    border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--ink);
    transition:transform 0.12s ease, box-shadow 0.12s ease;
    margin-bottom:26px;
  }
  .cta:hover, .cta:focus-visible{
    transform:translate(-2px,-2px);
    box-shadow:5px 5px 0 var(--ink);
    background:var(--coral-deep);
  }

  /* Tabs styled like sticky notes */
  .tabs{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:6px;
  }
  .tab-btn{
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:12.5px;
    border:2px solid var(--ink);
    border-radius:10px 10px 4px 4px;
    padding:8px 12px;
    cursor:pointer;
    color:var(--ink);
    background:var(--paper-line);
    transform:rotate(-2deg);
    transition:transform 0.12s ease, box-shadow 0.12s ease;
  }
  .tab-btn:nth-child(2){ transform:rotate(2deg); background:var(--sky); }
  .tab-btn:nth-child(3){ transform:rotate(-1.5deg); background:var(--pink); }
  .tab-btn:nth-child(4){ transform:rotate(1.5deg); background:var(--yellow); }
  .tab-btn:nth-child(5){ transform:rotate(-2deg); background:var(--mint); }
  .tab-btn.active{
    transform:rotate(0deg) translateY(-3px);
    box-shadow:2px 3px 0 var(--ink);
  }
  .tab-btn:focus-visible{ outline:2px solid var(--coral-deep); outline-offset:2px; }

  .panel{ display:none; padding-top:20px; }
  .panel.active{ display:block; }

  .about-text{
    font-size:14px;
    line-height:1.7;
    color:var(--ink);
    white-space:pre-wrap;
    background:repeating-linear-gradient(var(--paper) 0 27px, var(--paper-line) 27px 28px);
    padding:4px 2px;
  }

  .about-edit-area{
    width:100%;
    min-height:110px;
    font-family:'Nunito', sans-serif;
    font-size:13px;
    line-height:1.6;
    color:var(--ink);
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:10px;
    padding:10px;
    resize:vertical;
  }

  .subtabs{ display:flex; gap:8px; margin-bottom:16px; }
  .subtab-btn{
    background:#fff;
    border:1.5px solid var(--ink);
    border-radius:999px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:11px;
    padding:6px 13px;
    cursor:pointer;
    color:var(--ink);
  }
  .subtab-btn.active{ background:var(--ink); color:var(--paper); }
  .subtab-btn:focus-visible{ outline:2px solid var(--coral-deep); outline-offset:2px; }
  .subpanel{ display:none; }
  .subpanel.active{ display:block; }

  .item{
    border:1.5px solid var(--ink);
    background:#fff;
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:12px;
    position:relative;
    transform:rotate(-0.6deg);
  }
  .item:nth-child(even){ transform:rotate(0.6deg); }
  .item h3{
    font-family:'Fredoka', sans-serif;
    font-size:16px;
    font-weight:600;
    margin:0 0 4px;
    color:var(--ink);
  }
  .item .meta{
    font-family:'Space Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.04em;
    color:var(--coral-deep);
    margin-bottom:6px;
  }
  .item p{ font-size:13px; line-height:1.55; margin:0; color:var(--ink); }
  .item a.item-link{ font-size:12px; color:var(--mint-deep); font-weight:700; text-decoration:none; border-bottom:1.5px solid var(--mint-deep); }

  .empty-note{ font-size:12.5px; color:var(--muted); font-style:italic; padding:10px 0; }

  .erase-btn{
    position:absolute;
    top:10px;
    right:10px;
    background:#fff;
    border:1.5px solid var(--coral-deep);
    color:var(--coral-deep);
    font-size:10px;
    font-weight:700;
    border-radius:999px;
    padding:4px 9px;
    cursor:pointer;
    display:none;
  }
  .edit-on .erase-btn{ display:inline-block; }

  .add-form{
    display:none;
    border:2px dashed var(--ink);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:16px;
    background:#fff;
  }
  .edit-on .add-form{ display:block; }

  .add-form input, .add-form textarea{
    width:100%;
    font-family:'Nunito', sans-serif;
    font-size:12.5px;
    padding:8px;
    border:1.5px solid var(--paper-line);
    border-radius:8px;
    margin-bottom:8px;
    background:#fdfcf9;
  }
  .add-form textarea{ min-height:60px; resize:vertical; }

  .add-btn{
    background:var(--mint-deep);
    color:#fff;
    border:2px solid var(--ink);
    border-radius:10px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:12px;
    padding:9px 16px;
    cursor:pointer;
    box-shadow:2px 2px 0 var(--ink);
  }
  .add-btn:hover{ transform:translate(-1px,-1px); box-shadow:3px 3px 0 var(--ink); }

  /* Play / game */
  .game-intro{ font-size:13.5px; color:var(--muted); margin-bottom:14px; }
  .game-stage{
    position:relative;
    height:260px;
    background:linear-gradient(180deg, var(--sky) 0%, #eaf7fc 100%);
    border:2px solid var(--ink);
    border-radius:14px;
    overflow:hidden;
  }
  .game-hud{
    position:absolute;
    top:10px;
    left:10px;
    right:10px;
    display:flex;
    justify-content:space-between;
    font-family:'Space Mono', monospace;
    font-size:12px;
    font-weight:700;
    color:var(--ink);
    z-index:3;
  }
  .coin{
    position:absolute;
    top:-30px;
    font-size:26px;
    cursor:pointer;
    user-select:none;
    z-index:2;
    animation-name:fall;
    animation-timing-function:linear;
    animation-fill-mode:forwards;
  }
  @keyframes fall{ to{ top:260px; } }
  .play-btn{
    position:absolute;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    background:var(--coral);
    color:#fff;
    border:2px solid var(--ink);
    border-radius:999px;
    font-family:'Fredoka', sans-serif;
    font-weight:600;
    font-size:13px;
    padding:9px 20px;
    cursor:pointer;
    box-shadow:2px 2px 0 var(--ink);
    z-index:3;
  }
  .play-btn:hover{ background:var(--coral-deep); }
  .game-result{
    font-family:'Space Mono', monospace;
    font-size:13px;
    text-align:center;
    margin-top:12px;
    color:var(--ink);
  }

  /* Contact form */
  .contact-form{ display:flex; flex-direction:column; gap:10px; }
  .contact-form input, .contact-form textarea{
    font-family:'Nunito', sans-serif;
    font-size:13.5px;
    padding:10px 12px;
    border:1.5px solid var(--ink);
    border-radius:10px;
    background:#fff;
  }
  .contact-form textarea{ min-height:90px; resize:vertical; }
  .form-status{ font-size:12.5px; margin-top:10px; color:var(--mint-deep); font-weight:700; min-height:16px; }
  .form-status.error{ color:var(--coral-deep); }

  /* Edit toggle */
  .edit-toggle-row{ display:flex; justify-content:flex-end; margin-top:28px; }
  .edit-toggle{
    background:#fff;
    border:1.5px solid var(--muted);
    color:var(--muted);
    font-family:'Space Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.06em;
    border-radius:999px;
    padding:7px 14px;
    cursor:pointer;
  }
  .edit-toggle.on{ border-color:var(--coral-deep); color:var(--coral-deep); font-weight:700; }

  .hint{ font-size:10.5px; color:var(--muted); text-align:right; margin-top:6px; display:none; }
  .edit-on ~ .hint, .edit-on .hint{ display:block; }

  .confetti-piece{
    position:fixed;
    top:-10px;
    width:8px;
    height:8px;
    z-index:999;
    pointer-events:none;
    animation-name:confetti-fall;
    animation-timing-function:ease-in;
    animation-fill-mode:forwards;
  }
  @keyframes confetti-fall{
    to{ transform:translateY(100vh) rotate(360deg); opacity:0; }
  }

  @media (max-width:400px){
    .card{ padding:30px 18px 24px; }
    h1{ font-size:24px; }
    .head-row{ flex-direction:column; }
    #qrbox{ align-self:flex-start; }
  }
</style>
</head>
<body>
<div class="wrap">
  <div class="blob b1"></div>
  <div class="blob b2"></div>
  <div class="blob b3"></div>

  <div class="card" id="card">
    <div class="tape left"></div>
    <div class="tape right"></div>

    <div class="head-row">
      <div>
        <h1>Waad Elzubair Mohamed</h1>
        <p class="title">Business Student, University of Stirling · Aspiring Business Analyst</p>
      </div>
      <div id="qrbox"></div>
    </div>

    <div class="ledger">
      <div class="pill">✉️ <a href="mailto:lavywats40@gmail.com">Email</a></div>
      <div class="pill">📞 <a href="tel:+971508235412">Call</a></div>
      <div class="pill">🔗 <a href="https://www.linkedin.com/in/waad-abdelrahman-ali-elzubair-mohamed-21750a400" target="_blank" rel="noopener">LinkedIn</a></div>
    </div>

    <a class="cta" href="https://www.linkedin.com/in/waad-abdelrahman-ali-elzubair-mohamed-21750a400" target="_blank" rel="noopener">Connect on LinkedIn →</a>

    <div class="tabs">
      <button class="tab-btn active" data-tab="about">About</button>
      <button class="tab-btn" data-tab="projects">Projects</button>
      <button class="tab-btn" data-tab="experience">Experience</button>
      <button class="tab-btn" data-tab="play">Play 🎮</button>
      <button class="tab-btn" data-tab="emailus">Email Us</button>
    </div>

    <!-- ABOUT -->
    <div class="panel active" id="panel-about">
      <p class="about-text" id="aboutText"></p>
      <textarea class="about-edit-area" id="aboutEditArea" style="display:none;"></textarea>
    </div>

    <!-- PROJECTS -->
    <div class="panel" id="panel-projects">
      <div class="subtabs">
        <button class="subtab-btn active" data-sub="casestudy">Case Studies</button>
        <button class="subtab-btn" data-sub="practical">Practical</button>
      </div>

      <div class="subpanel active" id="sub-casestudy">
        <div class="add-form" id="form-casestudy">
          <input type="text" placeholder="Project title" data-field="title">
          <input type="text" placeholder="Date / course (optional)" data-field="meta">
          <textarea placeholder="Short description"></textarea>
          <input type="text" placeholder="Link (optional)" data-field="link">
          <button class="add-btn" onclick="addItem('casestudy')">+ Add case study</button>
        </div>
        <div id="list-casestudy"></div>
      </div>

      <div class="subpanel" id="sub-practical">
        <div class="add-form" id="form-practical">
          <input type="text" placeholder="Project title" data-field="title">
          <input type="text" placeholder="Date / tools used (optional)" data-field="meta">
          <textarea placeholder="Short description"></textarea>
          <input type="text" placeholder="Link (optional)" data-field="link">
          <button class="add-btn" onclick="addItem('practical')">+ Add practical project</button>
        </div>
        <div id="list-practical"></div>
      </div>
    </div>

    <!-- EXPERIENCE -->
    <div class="panel" id="panel-experience">
      <div class="add-form" id="form-experience">
        <input type="text" placeholder="Role" data-field="title">
        <input type="text" placeholder="Organization · Dates" data-field="meta">
        <textarea placeholder="What you did"></textarea>
        <input type="text" placeholder="Link (optional)" data-field="link">
        <button class="add-btn" onclick="addItem('experience')">+ Add experience</button>
      </div>
      <div id="list-experience"></div>
    </div>

    <!-- PLAY -->
    <div class="panel" id="panel-play">
      <p class="game-intro">Catch the coins before they hit the ground. 20 seconds. Go! 🪙</p>
      <div class="game-stage" id="gameStage">
        <div class="game-hud">
          <span>Score: <span id="gameScore">0</span></span>
          <span>Time: <span id="gameTime">20</span>s</span>
        </div>
        <button class="play-btn" id="playBtn">▶ Start</button>
      </div>
      <p class="game-result" id="gameResult"></p>
    </div>

    <!-- EMAIL US -->
    <div class="panel" id="panel-emailus">
      <form class="contact-form" id="contactForm">
        <input type="text" id="cf_name" placeholder="Your name" required>
        <input type="email" id="cf_email" placeholder="Your email" required>
        <textarea id="cf_message" placeholder="Say hi, or tell me about an opportunity..." required></textarea>
        <button type="submit" class="add-btn">Send message ✉️</button>
      </form>
      <p class="form-status" id="formStatus"></p>
    </div>

    <div class="edit-toggle-row">
      <button class="edit-toggle" id="editToggle">Edit mode: off</button>
    </div>
    <div class="hint">Edits are saved in this browser only — reopen this page to keep them.</div>

  </div>
</div>

<script>
  // ---- QR code ----
  new QRCode(document.getElementById("qrbox"), {
    text: "https://www.linkedin.com/in/waad-abdelrahman-ali-elzubair-mohamed-21750a400",
    width: 78,
    height: 78,
    colorDark: "#2B2320",
    colorLight: "#ffffff"
  });

  // ---- EmailJS setup ----
  const EMAILJS_SERVICE_ID = "service_wqx8m1c";
  const EMAILJS_TEMPLATE_ID = "template_ki2q5qr";
  const EMAILJS_PUBLIC_KEY = "3fzMXlLVBzID0AJN9";

  if (window.emailjs) {
    emailjs.init({ publicKey: EMAILJS_PUBLIC_KEY });
  }

  function notifyByEmail(message){
    if (!window.emailjs) return;
    const timestamp = new Date().toLocaleString();
    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      message: `${message}\n\nTime: ${timestamp}\nPage: ${window.location.href}`,
      from_name: "Digital Card Alert",
      reply_to: "no-reply@example.com"
    }).catch(err => console.error("EmailJS error:", err));
  }

  // ---- confetti ----
  function confettiBurst(){
    const colors = ['#FF6F5E', '#FFE08A', '#BFE3F5', '#BCE8CE', '#FFC2D6'];
    for(let i=0;i<24;i++){
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random()*100 + 'vw';
      p.style.background = colors[Math.floor(Math.random()*colors.length)];
      p.style.animationDuration = (1.6 + Math.random()*1.2) + 's';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      document.body.appendChild(p);
      setTimeout(()=>p.remove(), 3000);
    }
  }

  // ---- Tabs ----
  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('panel-'+btn.dataset.tab).classList.add('active');
    });
  });

  document.querySelectorAll('.subtab-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.subtab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.subpanel').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('sub-'+btn.dataset.sub).classList.add('active');
    });
  });

  // ---- Edit mode ----
  const card = document.getElementById('card');
  const editToggle = document.getElementById('editToggle');
  const EDIT_PASSWORD = "Waatr245";
  let editOn = false;

  editToggle.addEventListener('click', ()=>{
    if(!editOn){
      const attempt = prompt('Enter password to edit:');
      if(attempt === null) return;
      if(attempt !== EDIT_PASSWORD){
        alert('Incorrect password.');
        notifyByEmail("⚠️ Wrong password entered on your digital card's edit mode.");
        return;
      }
    }
    editOn = !editOn;
    card.classList.toggle('edit-on', editOn);
    editToggle.classList.toggle('on', editOn);
    editToggle.textContent = editOn ? 'Edit mode: on' : 'Edit mode: off';
    toggleAboutEdit();
    if(editOn){
      notifyByEmail("🔓 Someone entered the correct password and unlocked edit mode on your digital card.");
    }
  });

  // ---- About text ----
  const aboutText = document.getElementById('aboutText');
  const aboutEditArea = document.getElementById('aboutEditArea');
  const defaultAbout = "Business student at the University of Stirling with a growing interest in data-driven decision making. Currently exploring a path toward business analysis / business analytics — working on projects that combine business fundamentals with practical problem-solving. Open to internships, placements, and entry-level opportunities.";

  function loadAbout(){
    const saved = localStorage.getItem('waad_about');
    aboutText.textContent = saved || defaultAbout;
    aboutEditArea.value = saved || defaultAbout;
  }

  function toggleAboutEdit(){
    if(editOn){
      aboutText.style.display = 'none';
      aboutEditArea.style.display = 'block';
    } else {
      localStorage.setItem('waad_about', aboutEditArea.value.trim());
      aboutText.textContent = aboutEditArea.value.trim();
      aboutText.style.display = 'block';
      aboutEditArea.style.display = 'none';
    }
  }
  loadAbout();

  // ---- Projects / Experience storage ----
  const STORE_KEYS = { casestudy:'waad_casestudy', practical:'waad_practical', experience:'waad_experience' };

  function getItems(key){
    try{ return JSON.parse(localStorage.getItem(STORE_KEYS[key])) || []; }
    catch(e){ return []; }
  }
  function saveItems(key, items){
    localStorage.setItem(STORE_KEYS[key], JSON.stringify(items));
  }

  function renderList(key){
    const listEl = document.getElementById('list-'+key);
    const items = getItems(key);
    listEl.innerHTML = '';
    if(items.length === 0){
      const empty = document.createElement('div');
      empty.className = 'empty-note';
      empty.textContent = 'Nothing added yet.';
      listEl.appendChild(empty);
      return;
    }
    items.forEach((it, idx)=>{
      const div = document.createElement('div');
      div.className = 'item';
      div.innerHTML = `
        <button class="erase-btn" onclick="eraseItem('${key}', ${idx})">✕ Erase</button>
        <h3>${escapeHtml(it.title)}</h3>
        ${it.meta ? `<div class="meta">${escapeHtml(it.meta)}</div>` : ''}
        <p>${escapeHtml(it.desc)}</p>
        ${it.link ? `<br><a class="item-link" href="${escapeAttr(it.link)}" target="_blank" rel="noopener">View →</a>` : ''}
      `;
      listEl.appendChild(div);
    });
  }

  function addItem(key){
    const form = document.getElementById('form-'+key);
    const title = form.querySelector('[data-field="title"]').value.trim();
    const meta = form.querySelector('[data-field="meta"]').value.trim();
    const desc = form.querySelector('textarea').value.trim();
    const link = form.querySelector('[data-field="link"]').value.trim();
    if(!title || !desc){
      alert('Please add at least a title and a short description.');
      return;
    }
    const items = getItems(key);
    items.push({ title, meta, desc, link });
    saveItems(key, items);
    form.querySelectorAll('input, textarea').forEach(el=>el.value='');
    renderList(key);
    notifyByEmail(`➕ New item added to "${key}" on your digital card:\nTitle: ${title}`);
  }

  function eraseItem(key, idx){
    const items = getItems(key);
    const removed = items[idx];
    items.splice(idx, 1);
    saveItems(key, items);
    renderList(key);
    notifyByEmail(`➖ Item erased from "${key}" on your digital card:\nTitle: ${removed ? removed.title : '(unknown)'}`);
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }
  function escapeAttr(str){
    return str.replace(/"/g,'&quot;');
  }

  ['casestudy','practical','experience'].forEach(renderList);

  // ---- Play: coin catch game ----
  const gameStage = document.getElementById('gameStage');
  const gameScoreEl = document.getElementById('gameScore');
  const gameTimeEl = document.getElementById('gameTime');
  const gameResultEl = document.getElementById('gameResult');
  const playBtn = document.getElementById('playBtn');

  let gameScore = 0;
  let gameTimeLeft = 20;
  let spawnInterval = null;
  let timerInterval = null;
  let gameActive = false;

  function spawnCoin(){
    const coin = document.createElement('div');
    coin.className = 'coin';
    coin.textContent = Math.random() > 0.5 ? '🪙' : '💰';
    const stageWidth = gameStage.clientWidth;
    coin.style.left = (Math.random() * (stageWidth - 32)) + 'px';
    const duration = 2 + Math.random() * 1.6;
    coin.style.animationDuration = duration + 's';
    coin.addEventListener('click', ()=>{
      if(!gameActive) return;
      gameScore++;
      gameScoreEl.textContent = gameScore;
      coin.remove();
    });
    coin.addEventListener('animationend', ()=> coin.remove());
    gameStage.appendChild(coin);
  }

  function startGame(){
    gameScore = 0;
    gameTimeLeft = 20;
    gameScoreEl.textContent = 0;
    gameTimeEl.textContent = 20;
    gameResultEl.textContent = '';
    gameActive = true;
    playBtn.style.display = 'none';
    document.querySelectorAll('.coin').forEach(c=>c.remove());

    spawnInterval = setInterval(spawnCoin, 550);
    timerInterval = setInterval(()=>{
      gameTimeLeft--;
      gameTimeEl.textContent = gameTimeLeft;
      if(gameTimeLeft <= 0){
        endGame();
      }
    }, 1000);
  }

  function endGame(){
    gameActive = false;
    clearInterval(spawnInterval);
    clearInterval(timerInterval);
    document.querySelectorAll('.coin').forEach(c=>c.remove());
    playBtn.textContent = '▶ Play again';
    playBtn.style.display = 'block';
    gameResultEl.textContent = `You caught ${gameScore} coin${gameScore===1?'':'s'}! Not bad for a future analyst 📊`;
  }

  playBtn.addEventListener('click', startGame);

  // ---- Email Us form ----
  const contactForm = document.getElementById('contactForm');
  const formStatus = document.getElementById('formStatus');

  contactForm.addEventListener('submit', (e)=>{
    e.preventDefault();
    if(!window.emailjs){
      formStatus.textContent = 'Message service unavailable right now — please email directly.';
      formStatus.classList.add('error');
      return;
    }
    const name = document.getElementById('cf_name').value.trim();
    const email = document.getElementById('cf_email').value.trim();
    const message = document.getElementById('cf_message').value.trim();

    formStatus.classList.remove('error');
    formStatus.textContent = 'Sending...';

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      from_name: name,
      reply_to: email,
      message: `${message}\n\nFrom: ${name} (${email})`
    }).then(()=>{
      formStatus.textContent = 'Message sent! I\'ll get back to you soon. 🎉';
      confettiBurst();
      contactForm.reset();
    }).catch((err)=>{
      console.error('EmailJS error:', err);
      formStatus.classList.add('error');
      formStatus.textContent = 'Something went wrong — please try emailing directly.';
    });
  });
</script>

</body>
</html>
